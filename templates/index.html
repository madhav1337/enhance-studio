<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Enhance Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✨</text></svg>">
</head>
<body>
  <div class="app">
    <header class="hero">
      <div class="hero-mark">✨</div>
      <div>
        <h1>Enhance Studio</h1>
        <p class="sub">Drag in your photos &mdash; pick a look &mdash; download the result. Originals are never touched.</p>
      </div>
    </header>

    <section class="step">
      <h2><span class="n">1</span> Choose a pipeline</h2>
      <div id="picker" class="picker"></div>
      <div id="options" class="options" hidden></div>
    </section>

    <section class="step">
      <h2><span class="n">2</span> Add photos</h2>
      <div id="drop" class="dropzone" tabindex="0">
        <input id="file-input" type="file" accept="image/*" multiple hidden>
        <div class="dz-inner">
          <div class="dz-icon">⬆</div>
          <p class="dz-title">Drop images here</p>
          <p class="dz-hint">or <button type="button" id="browse" class="link">browse</button> &middot; JPG, PNG, WEBP, TIFF, BMP</p>
        </div>
      </div>
    </section>

    <section id="results-section" class="step" hidden>
      <div class="results-head">
        <h2><span class="n">3</span> Results</h2>
        <div class="results-actions">
          <button id="download-all" class="btn" disabled>⬇ Download all (ZIP)</button>
          <button id="clear" class="btn ghost">Clear</button>
        </div>
      </div>
      <div id="results" class="results"></div>
    </section>
  </div>

  <script id="pipelines-data" type="application/json">{{ pipelines|tojson }}</script>
  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
